name: Update Suno Prompt Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 6'

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update catalog
        run: npm run update:suno-catalog

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/sunoPromptCatalog.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update suno prompt catalog"
          git push
